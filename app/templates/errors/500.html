{% extends "base.html" %}
{% block title %}500 Server Error — ParkEasy{% endblock %}
{% block content %}
<div class="text-center py-5">
    <h1 class="display-1 text-danger">500</h1>
    <p class="lead">Something went wrong on our end. Please try again later.</p>
    <a href="{{ url_for('admin.dashboard') if current_user.is_authenticated and current_user.is_admin()
               else url_for('main.dashboard') if current_user.is_authenticated
               else url_for('auth.login') }}"
       class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
