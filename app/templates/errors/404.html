{% extends "base.html" %}
{% block title %}404 Not Found — ParkEasy{% endblock %}
{% block content %}
<div class="text-center py-5">
    <h1 class="display-1 text-warning">404</h1>
    <p class="lead">The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('admin.dashboard') if current_user.is_authenticated and current_user.is_admin()
               else url_for('main.dashboard') if current_user.is_authenticated
               else url_for('auth.login') }}"
       class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
