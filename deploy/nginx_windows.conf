# Nginx reverse-proxy config for Windows
# Place this file at:  C:\nginx\conf\sites\parking.conf
# Then include it from nginx.conf:  include sites/*.conf;
#
# Nginx on Windows uses forward slashes even for Windows paths.

server {
    listen 80;
    server_name _;   # replace with your domain or leave as _ to match any hostname

    # Forward all requests to Waitress (including static files)
    # Waitress serves static files via Flask -- acceptable for demo/course deployments.
    # For high-traffic production, add a static alias pointing to your app/static/ folder.
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    client_max_body_size 5M;
}
